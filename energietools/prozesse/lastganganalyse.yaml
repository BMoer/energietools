meta:
  id: lastganganalyse
  prozess_version: 1.0.0
  stand: 2026-07-12
  market: AT
  license: MIT

ziel: >
  Aus einem Lastgang (15-min-Netzbezug/-Verbrauch, per EDA-Consent) verstehen,
  was den Verbrauch treibt, und beziffern, welcher Hebel — in der Reihenfolge
  Tarif vor Verhalten vor Speicher — was bringt. Erfolg: eine Empfehlung mit
  auditierbarem Rechenweg (No-LLM-Math) und die beantworteten Rückfragen als
  persistierte Profil-Fakten.

benoetigte_daten:
  - {feld: serie_ref, quelle: eda_consent, pflicht: true, format: "Referenz auf die Q15-/Tages-Serie im gridbert-Box-Postgres (WP2-E) — die Rohserie selbst läuft NIE durchs User-LLM (Amendment 4); der Gateway löst serie_ref account-gebunden auf und füttert 'consumption' in die energietools-Capabilities."}
  - {feld: zp, quelle: rechnung, pflicht: true, format: "Zählpunkt aus den Invoice-Fakten der Instanz (kein Abtippen) — schaltet den EDA-Consent (request_data_release) frei."}
  - {feld: plz, quelle: "rechnung|frage", pflicht: true, format: "4-stellig — für exakte Netzkosten/Tarifvergleich in spot_backtest.tarif_ersparnis; ohne PLZ sind €-Zahlen Heuristik."}
  - {feld: energiepreis_brutto_ct_kwh, quelle: "rechnung|frage", pflicht: false, format: "ct/kWh brutto, aktueller Arbeitspreis — für spot_backtest (Vergleichsbasis Fix vs. Spot, Hebel Tarif)."}
  - {feld: aktuelle_grundgebuehr_brutto_eur_monat, quelle: "rechnung|frage", pflicht: false, format: "EUR/Monat brutto — für spot_backtest.tarif_ersparnis; fehlt sie, liefert der Block verfuegbar=false + grund (keine stille 0)."}
  - {feld: heizung, quelle: "rechnung|frage", pflicht: false, format: "Heizungstyp (elektrisch/Gas/Fernwärme/Pellets) — bestätigt oder widerlegt das electric_heating-Signal, schaltet den WP-Tarif-Hebel frei (f_wp_tarif)."}
  - {feld: pv_status, quelle: "rechnung|frage", pflicht: false, format: "PV vorhanden? kWp, Speicher — bestätigt/widerlegt pv_self_consumption; eine bestätigte Einspeisung löst einen zweiten Consent für den Einspeise-Zählpunkt aus (WP2-E (b))."}
  - {feld: ev_status, quelle: "rechnung|frage", pflicht: false, format: "E-Auto/Wallbox vorhanden? Ladeleistung (kW) — Kontext für ein Nachtladen-Muster (Wallbox-Nächte, Ledger-F6/F8)."}

fragen:
  - id: f_heizung_likely
    hebel: tarif
    bedingung: "electric_heating == likely (winter_summer_ratio >= 2,5, lastgang_signals)"
    text: "Dein Winterverbrauch ist deutlich höher — heizt du mit Strom (Wärmepumpe/Direktheizung) oder nur mehr Beleuchtung/Geräte?"
    feld: asset.heating.type
    ableitung: "Setzt asset.heating.type. Bei is_pv=true ersetzt der PV-Guard (Ledger-F24) diesen Text automatisch durch die neutrale Formulierung und stuft das Signal auf 'unknown' zurück — die Frage bleibt inhaltlich offen statt zu behaupten."
  - id: f_heizung_unlikely
    hebel: tarif
    bedingung: "electric_heating == unlikely"
    text: "Dein Stromverbrauch ist über das Jahr flach — heizt du mit Gas/Fernwärme/Pellets (also nicht elektrisch)?"
    feld: asset.heating.type
    ableitung: "Setzt asset.heating.type (Widerlegung möglich, z. B. bei sehr gut gedämmten Wärmepumpen-Häusern — das Signal bleibt eine Hypothese, keine Behauptung)."
  - id: f_pv_signal
    hebel: speicher
    bedingung: "pv_self_consumption == likely (midday_dip_ratio < 0,85 oder gemeldete Einspeisung, lastgang_signals)"
    text: "Tagsüber sinkt dein Netzbezug auffällig — hast du eine PV-Anlage? Wie viel kWp, und gibt es einen Speicher? Und: hast du eine PV-Einspeisung, für die wir einen eigenen Consent bräuchten?"
    feld: asset.pv.kwp
    ableitung: "Setzt asset.pv.kwp/asset.battery.kwh — NEU ggü. dem reinen Signal-Port: eine bestätigte PV-Einspeisung löst einen ZWEITEN Consent für den Einspeise-Zählpunkt aus (energy_direction=generation, WP2-E (b)); danach greifen die PV-Guards (basis_label='Netzbezug')."
  - id: f_dauerlaeufer
    hebel: verhalten
    bedingung: "high_continuous_load == likely (night_base_w >= 300 W, lastgang_signals)"
    text: "Nachts läuft konstant einiges an Grundlast durch — gibt es Dauerverbraucher (Pool, Aquarium, Server, alter Kühlschrank, Boiler)?"
    feld: asset.continuous_loads
    ableitung: "Setzt asset.continuous_loads — night_base_w ist bereits in Watt UND mit Fenster (00:00–04:59) gelabelt (Ledger-F7: Einheit+Fenster nie im Kopf konvertieren)."
  - id: f_lastverschiebung
    hebel: verhalten
    bedingung: "immer (unabhängig vom Signal-Zustand gestellt, select_rueckfragen)"
    text: "Dein Tages-Peak liegt zu einer bestimmten Abendstunde — kannst du Wasch-/Spül-/Trockner-Läufe zeitlich verschieben?"
    feld: behavior.appliance_timing
    ableitung: "Setzt behavior.appliance_timing — Hebel 'Verhalten', unabhängig vom Ausgang der übrigen Signale."
  - id: f_wp_tarif
    hebel: tarif
    bedingung: "asset.heating.type bestätigt elektrisch (aus f_heizung_likely oder Rechnungsdaten) — Hebel-Frage aus Rezept 07"
    text: "Läuft dein Heizungs-/Wärmepumpen-Zähler schon auf einem Wärmepumpen-/Heizstromtarif oder auf einem normalen Haushaltstarif? Ist er als unterbrechbar angemeldet (reduziertes Netzentgelt)?"
    feld: contract.heiztarif_typ
    ableitung: "Größter sicherer Sofort-Hebel bei bestätigter E-Heizung — schaltet den Heizstromtarif-Vergleich frei (Rezept 07 Hebel 1)."
  - id: f_pv_eckdaten
    hebel: speicher
    bedingung: "asset.pv.kwp bestätigt (aus f_pv_signal oder Rechnungsdaten) — Hebel-Frage aus Rezept 07"
    text: "Wie groß ist die PV-Anlage genau (kWp), Ausrichtung/Neigung, Inbetriebnahmejahr — und gibt es schon einen Batteriespeicher (kWh)?"
    feld: asset.battery.kwh
    ableitung: "Speicher-Dimensionierung/-Wirtschaftlichkeit (Rezept 07 Hebel 3/4) — die Tag/Nacht-Verschiebung dafür braucht zusätzlich Q15-Auflösung (siehe f_q15_optin)."
  - id: f_q15_optin
    hebel: datenqualitaet
    bedingung: "Consent liefert nur Tageswerte (kein 15-min-Opt-in) — aus list_load_series/get_data_release_status ablesbar"
    text: "Dein Smart Meter liefert aktuell nur Tageswerte — aktivierst du den Viertelstundenwerte-Opt-in im Netzbetreiber-Portal? Damit werden Ursachen-Signale, Geräte-Zerlegung und der profilgewichtete Spot-Vergleich möglich, die mit Tageswerten nicht gehen."
    feld: meter.q15_optin
    ableitung: "Granularitäts-Guard (F29 (a)): ohne Q15 verweigern lastgang_signals/trend_attribution/spot_backtest mit Begründung — diese Frage ist die aktive Opt-in-Empfehlung aus dem Tageswerte-Pfad (Rezept 07 Hebel 4/6)."

tool_mapping:
  - schritt: serien_uebersicht
    capability: list_load_series
    quelle: extern
    rolle: aktiv
    regeln:
      - "Erster Schritt: welche Serien liegen bereits am Account (ZP maskiert, Richtung, Zeitraum, Coverage, Datenstand) — bevor irgendetwas neu angefordert wird (kein doppelter Consent-Flow)."
      - "Meldet auch die Granularität (Q15 vs. Tageswerte) — Grundlage für den Tageswerte-Pfad-Guard (F29 (a), siehe datenqualitaet_abbruch)."

  - schritt: datenfreigabe_anfordern
    capability: request_data_release
    quelle: extern
    rolle: aktiv
    regeln:
      - "Nur falls serien_uebersicht keine aktive Freigabe zeigt. ZP kommt aus den Invoice-Fakten der Instanz (kein Abtippen, WP2-E (b))."
      - "Kündigt den Portal-Schritt EXAKT an: 'Freigaben→Offen, Provider EP100505, 1 Klick' — nie einen anderen Text erfinden."
      - "Bei bestätigter PV-Einspeisung (f_pv_signal): zweiter Consent-Aufruf für den Einspeise-Zählpunkt (energy_direction=generation)."

  - schritt: datenfreigabe_status
    capability: get_data_release_status
    quelle: extern
    rolle: aktiv
    regeln:
      - "Warte-UX ist Pflicht: CM_CONF-Latenz kann Minuten bis Stunden dauern — ehrlich 'das kann dauern' sagen, statt endlos zu pollen."
      - "Nach Consent-Aktivierung fordert der ESP die Historie automatisch an — kein zweiter User-Schritt nötig (WP2-E (c))."

  - schritt: lastprofil_metriken
    capability: load_profile
    quelle: energietools
    rolle: aktiv
    nicht_benutzerdaten: [consumption_data]
    regeln:
      - "consumption_data ist die vom Gateway aus serie_ref aufgelöste Serie — läuft NIE als Rohserie durchs User-LLM (Amendment 4)."
      - "Läuft auch auf Tageswerten weiter (Granularitäts-Caveat statt Verweigerung, F29 (a))."

  - schritt: ursachen_signale
    capability: lastgang_signals
    quelle: energietools
    rolle: aktiv
    pflicht_inputs: [consumption]
    nicht_benutzerdaten: [consumption]
    regeln:
      - "consumption ist die vom Gateway aufgelöste Serie (s. lastprofil_metriken)."
      - "Verweigert bei Tageswerten (interval_minutes >= 60) mit Begründung — dann aktiv den Q15-Opt-in empfehlen (f_q15_optin, F29 (a))."
      - "is_pv aus dem Einspeise-Consent/ZP-Suffix setzen — schaltet die PV-Guards (Netzbezug-Label, electric_heating-Herabstufung, Ledger-F3/F14/F24)."
      - "Treibt den signal-getriebenen Rückfragen-Katalog (fragen-Block) — nur die Fragen stellen, deren Signal feuert."

  - schritt: mehrjahres_trend
    capability: load_trend
    quelle: energietools
    rolle: aktiv
    pflicht_inputs: [consumption]
    nicht_benutzerdaten: [consumption]
    regeln:
      - "Kalender-YoY nur bei >=2 vollen Kalenderjahren (Coverage-Guard) — sonst Fenster-YoY; NIE ein Teiljahr gegen ein Volljahr stellen."
      - "Läuft auch auf Tageswerten weiter (Granularitäts-Caveat, F29 (a))."

  - schritt: treiber_zerlegung
    capability: trend_attribution
    quelle: energietools
    rolle: aktiv
    pflicht_inputs: [consumption]
    nicht_benutzerdaten: [consumption]
    regeln:
      - "Nur sinnvoll mit >=2 Jahren Q15-Historie — braucht dieselbe Serie wie mehrjahres_trend."
      - "Verweigert bei Tageswerten mit Begründung (F29 (a))."
      - "Ergebnis ist eine Geräte-KLASSE als Hypothese, NIE ein Gerätename (15-min-Grenze, Abnahme-Kriterium 15 — hartes DoD-Gate)."

  - schritt: spot_und_tarifvergleich
    capability: spot_backtest
    quelle: energietools
    rolle: aktiv
    nicht_benutzerdaten: [consumption, spot_prices]
    regeln:
      - "spot_prices kommt aus der EPEX-Reihe im Box-Postgres (WP-D), nicht vom User-LLM."
      - "tarif_ersparnis ist NUR verfügbar, wenn plz/energiepreis_brutto_ct_kwh/aktuelle_grundgebuehr_brutto_eur_monat/aktueller_lieferant/jahresverbrauch_kwh vorliegen — sonst verfuegbar=false + grund, NIE eine stille 0."
      - "Verweigert bei Tageswerten mit Begründung (F29 (a))."
      - "Hebel-Reihenfolge (ziel): Tarif zuerst prüfen, bevor Verhaltens-/Speicher-Hebel folgen."

  - schritt: rueckfragen_persistieren
    capability: submit_lastgang_facts
    quelle: extern
    rolle: aktiv
    regeln:
      - "Die beantworteten Rückfragen (fragen-Block) werden als Profil-Fakten persistiert — gleiche Rejection-Semantik wie submit_invoice_facts (D2.2)."
      - "Session 2: get_page/search_pages liefert den Fakt ohne erneute Frage (Abnahme-Kriterium 6) — kein neuer Mechanismus, dasselbe ingest→compile_next-Muster (§3.6 Punkt 1)."

datenqualitaet_abbruch:
  - "PV-Guard: is_pv=true (Einspeiser erkannt) -> Metriken NICHT als Verbrauch verkaufen, sondern als Netzbezug labeln (lastgang_signals.basis_label='Netzbezug'); electric_heating wird bei PV zur Rückfrage statt Behauptung herabgestuft (Ledger-F24)."
  - "Coverage-Guard: Teiljahr (<2 volle Kalenderjahre) -> load_trend verweigert die Kalender-YoY (calendar_yoy_verweigert_grund gesetzt) und weicht auf die Fenster-YoY über deckungsgleiche (Monat,Tag,Std,Min)-Slots aus — kein Kalenderjahr-gegen-Teiljahr-Vergleich."
  - "Mindestdaten: mindestens 1 Tag à 96 Q15-Intervalle — darunter meldet load_profile 'Zu wenig Datenpunkte' und die Analyse bricht ab, statt einen Wert zu erfinden."
  - "Magnitude+Frequenz an dieselbe Schwelle binden (Ledger-F6): jede Häufigkeits-Aussage (z. B. 'X Nächte über Y kW') nennt die Nächtezahl NUR neben genau der kW-Schwelle, mit der sie berechnet wurde — nie zwei Schwellen im selben Satz mischen (Cross-Citation-Fehler)."
  - "Granularitäts-Guard (F29 (a)): Tageswerte-Serie (kein 15-min-Opt-in, interval_minutes >= 60) -> lastgang_signals/trend_attribution/spot_backtest verweigern mit Begründung + aktiver Q15-Opt-in-Empfehlung (f_q15_optin); load_profile/load_trend laufen weiter, aber mit explizitem Granularitäts-Caveat statt Intraday-Signalen."

caveats:
  - trigger: "is_pv == true"
    text: >
      Die Metriken beschreiben deinen NETZBEZUG, nicht deinen Gesamtverbrauch —
      bei einer PV-Anlage ist der Mittags-Bezug PV-gedeckt und dadurch niedriger
      als der reale Verbrauch.
  - trigger: "anzahl_treiber > 0"
    text: >
      Die Geräte-Zerlegung nennt eine Geräte-KLASSE als Hypothese (z. B.
      "Kochen", "Elektronik"), NIE ein konkretes Gerät — ein 15-Minuten-Takt
      kann taktende Einzelgeräte nicht identifizieren, nur andauernde
      Lastmuster.
  - trigger: "immer"
    text: >
      Ein Teiljahr oder Halbjahr im Lastgang wird NICHT auf ein volles Jahr
      hochgerechnet — ohne Saisonalitäts-Korrektur wäre das kein verlässlicher
      Jahreswert.
  - trigger: "immer"
    text: >
      Jede Anteils-/Prozent-Zahl (z. B. Grundlast-Anteil, Profilkostenfaktor)
      trägt ihre Nenner-Definition aus dem Tool-Result — nie ohne diese
      Definition weiterreichen.
  - trigger: "immer"
    text: >
      €-Beträge ohne eine bestätigte PLZ sind eine grobe Heuristik (kein
      hinterlegter Netzbetreiber, keine regionale Tarifprüfung) — sobald die
      PLZ vorliegt, werden sie exakt.
  - trigger: "immer"
    text: >
      Die Lastgang-Daten enden am Vortag 23:45 (EDA-Tagesrhythmus, kein
      Echtzeit-Smart-Meter) — die Analyse ist nie "live", sondern maximal bis
      gestern Abend aktuell.
  - trigger: "immer"
    text: >
      Jede Zahl in der Antwort stammt wörtlich aus einem Tool-Result
      (load_profile/lastgang_signals/load_trend/trend_attribution/
      spot_backtest) — nie selbst gerechnet, gerundet oder paraphrasiert
      (Ledger-F7/F8: kein Cross-Citation-Fehler).
